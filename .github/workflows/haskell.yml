name: Haskell

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'vscode/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'vscode/**'

jobs:
  haskell:
    name: Haskell
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell Stack
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: '3.3.1'

      - name: Cache Stack Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'package.yaml') }}
          restore-keys: ${{ runner.os }}-stack-

      - name: Install HPack
        run: stack install hpack

      - name: Install BNFC
        run: |
          stack install BNFC
          stack install alex
          stack install happy

      - name: Generate SyntaxGen Module
        run: ./syntax/stella/codegen.bash

      - name: Generate Yson.SyntaxGen Module
        run: ./syntax/yson/codegen.bash

      - name: Generate Cabal File
        run: hpack

      - name: Build Dependencies
        run: stack build --only-dependencies

      - name: Build Project
        run: stack build

      - name: Test
        run: stack test

      - name: Install Ormolu
        run: stack install ormolu

      - name: Check Haskell Formatting
        run: |
          ormolu --mode check $(find . -path './src/*.hs' -not -path './src/*SyntaxGen/*')
          ormolu --mode check $(find . -path './test/*.hs')

      - name: Install HLint
        run: stack install hlint

      - name: Check Haskell Style
        run: hlint .

      - name: Install ShellCheck
        run: |
          sudo apt-get install -y shellcheck

      - name: Check Shell Style
        run: |
          find . -name "*.bash" -type f | while read f; do
            shellcheck "$f" || exit 1
          done

      - name: Install MarkdownLint
        run: |
          npm install -g markdownlint-cli

      - name: Check Markdown Style
        run: |
          find . -name "*.md" -type f | while read f; do
            markdownlint "$f" || exit 1
          done
