name: VSCode

on:
  push:
    branches:
      - main
    paths:
      - "vscode/**"
      - "syntax/Stella.cf"
  pull_request:
    branches:
      - main
    paths:
      - "vscode/**"
      - "syntax/Stella.cf"

jobs:
  vscode:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - name: Integration Test (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgbm1 libnss3 xvfb
          xvfb-run -a npm test

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository --out yqstella.vsix
